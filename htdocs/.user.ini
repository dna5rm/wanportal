; PHP per-directory ini for /var/www/localhost/htdocs
;
; These settings harden the session cookie. PHP reads this file at
; startup, before any application code runs, so the values take
; effect even on pages that call session_start() before including
; config.php (which is the pattern used by index.php, login.php,
; server.php, and most of the *edit.php files).
;
; If a setting needs to change, remember PHP caches .user.ini for
; the directory for up to 5 minutes (user_ini.cache_ttl). Bounce
; the container or wait it out, or set the value via Apache
; SetEnvIf + php_value in .htaccess for immediate effect.

; Make the session cookie unreadable to JavaScript. Closes the
; XSS-pivot path where a successful script injection could read
; document.cookie and exfiltrate the session id.
session.cookie_httponly = 1

; Reject the session cookie on cross-site POST/PUT/DELETE/etc.
; The login form posts same-origin, so this is invisible to users
; but blocks CSRF on session-cookie-based auth. "Lax" is the
; modern default and balances security with legitimate cross-site
; GET navigation (e.g. clicking a link from an email).
session.cookie_samesite = Lax

; Reject uninitialized session IDs sent by the client. Without
; this, an attacker can fixate a session by setting a known PHPSESSID
; cookie on the victim's browser before they log in; the victim's
; subsequent login then adopts the attacker's session id.
session.use_strict_mode = 1

; session.cookie_secure is NOT set here unconditionally.
; The wanportal_session_start() helper in config.php sets it
; dynamically based on whether the request is HTTPS (direct or
; via X-Forwarded-Proto). Setting it to 1 here unconditionally
; breaks login over plain HTTP because the browser drops the
; cookie. If you only ever serve over TLS and want belt-and-
; suspenders, uncomment the line below:
; session.cookie_secure = 1

; Hardening bonus: use a random session id length (default is
; already 48 chars of entropy via hash_hmac, so this is mostly
; documentation; explicitly setting it makes the intent visible).
session.sid_length = 48

; Hardening bonus: only the session id and any explicitly-set
; session data should be in the cookie. The default is fine but
; being explicit avoids surprises if the default ever changes.
; session.use_cookies = 1   ; already on, listed for reference
; session.use_only_cookies = 1   ; already on, listed for reference
