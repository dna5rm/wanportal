---
services:
  wanportal:
    build:
      context: .
      dockerfile: Dockerfile
    image: wanportal
    container_name: wanportal
    volumes:
      - rrd:/var/rrd:rw
      - .:/srv:rw # DEV
    ports:
      - "${HTTP_LISTEN:-0.0.0.0}:${HTTP_PORT:-8080}:80"
    restart: unless-stopped
    # healthcheck:
    #   test: CMD curl -f http://localhost/cgi-bin/api/agent || exit 1
    #   interval: 1m
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s
    environment:
      # LDAP (optional - remove or set to false to use local auth only)
      - AUTH_LDAP_ENABLED=${AUTH_LDAP_ENABLED:-false}
      - AUTH_LDAP_SERVER_URI=${AUTH_LDAP_SERVER_URI}
      - AUTH_LDAP_BIND_DN=${AUTH_LDAP_BIND_DN}
      - AUTH_LDAP_BIND_PASSWORD=${AUTH_LDAP_BIND_PASSWORD}
      - AUTH_LDAP_USER_SEARCH_BASEDN=${AUTH_LDAP_USER_SEARCH_BASEDN}
      - AUTH_LDAP_USER_SEARCH_ATTR=${AUTH_LDAP_USER_SEARCH_ATTR}
      - LDAP_IGNORE_CERT_ERRORS=${LDAP_IGNORE_CERT_ERRORS:-true}
      - MYSQL_HOST=${MYSQL_HOST:-wandb}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-netops}
      - MYSQL_DB=${MYSQL_DB:-netops}
      - TZ=${TZ:-UTC}
    networks:
      - netops

  wandb:
    image: mariadb:latest
    command: --default-authentication-plugin=mysql_native_password
    container_name: wandb
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:-netops}
      - MYSQL_DATABASE=${MYSQL_DB:-netops}
      - TZ=${TZ:-UTC}
    expose:
      - 3306
    restart: unless-stopped
    volumes:
      - mysql:/var/lib/mysql:rw
    networks:
      - netops

networks:
  netops:
    enable_ipv6: true
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 100.172.42.0/24

volumes:
  rrd:
  mysql:
